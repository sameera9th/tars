services:
  postgres:
    image: postgres:16
    container_name: tars-postgres
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: tars
      POSTGRES_PASSWORD: tars
      POSTGRES_DB: tars_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: tars-api
    working_dir: /app/api
    command: pnpm start:dev
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/api/node_modules
      - /app/ui/node_modules
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://tars:tars@postgres:5432/tars_dev?schema=public
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      - postgres

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    container_name: tars-ui
    working_dir: /app/ui
    command: pnpm dev --hostname 0.0.0.0
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/api/node_modules
      - /app/ui/node_modules
    environment:
      NODE_ENV: development
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:3001
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      - api

volumes:
  postgres_data:
